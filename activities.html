<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="מערכי פעילות לגיל הרך | אנה גלפר. תוכניות פעילות מקצועיות ומוכנות לשימוש לגננות." />
  <title>הדרכה לגננת | אנה גלפר</title>
  <link rel="stylesheet" href="style.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6GPE6BY9J5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6GPE6BY9J5');
  </script>
</head>
<body data-page="activities" data-page-type="מערך פעילות">

  <!-- ═══════════════ HEADER ═══════════════ -->
  <header class="site-header" id="siteHeader">
    <div class="container hdr-inner">
      <a href="index.html" class="hdr-brand-link">
        <img src="logo.png" alt="אנה גלפר" class="hdr-logo" />
      </a>
      <nav class="hdr-nav" aria-label="ניווט ראשי">
        <a href="index.html"         class="nav-link">בית</a>
        <a href="activities.html"    class="nav-link active">הדרכה לגננת</a>
        <a href="units.html"         class="nav-link">גלויות מקוונות</a>
        <a href="games.html"         class="nav-link">משחקים דיגיטליים</a>
        <a href="about.html"         class="nav-link">אודות</a>
      </nav>
      <button class="hdr-burger" id="burgerBtn" aria-label="פתח תפריט" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="hdr-mobile" id="mobileMenu" aria-hidden="true">
      <a href="index.html"         class="mobile-link">🏠 בית</a>
      <a href="activities.html"    class="mobile-link">📋 הדרכה לגננת</a>
      <a href="units.html"         class="mobile-link">📚 גלויות מקוונות</a>
      <a href="games.html"         class="mobile-link">🖥️ משחקים דיגיטליים</a>
      <a href="about.html"         class="mobile-link">👩‍🏫 אודות</a>
    </div>
  </header>

  <main>

    <!-- ═══════════════ PAGE BANNER ═══════════════ -->
    <div class="page-banner" role="banner" aria-label="כותרת דף">
      <div class="page-banner-inner container">
        <a href="index.html" class="back-home-btn">&#x2190; חזרה לדף הבית</a>
        <span class="page-banner-icon" aria-hidden="true">📋</span>
        <h1>הדרכה לגננת</h1>
        <p>תוכן פדגוגי לגננות — מוכן לשימוש ומותאם לגיל הרך</p>
      </div>
      <div class="page-banner-wave" aria-hidden="true">
        <svg viewBox="0 0 1440 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,30 C360,60 1080,0 1440,40 L1440,60 L0,60 Z" fill="#F9F6EF"/>
        </svg>
      </div>
    </div>

    <!-- ═══════════════ CONTENT SECTION ═══════════════ -->
    <section class="content-section" aria-label="תכנים">
      <video class="content-bg-video" autoplay muted loop playsinline aria-hidden="true">
        <source src="bg-video.mp4" type="video/mp4" />
      </video>
      <div class="container">

        <!-- Filter area -->
        <div class="filter-area" role="search" aria-label="חיפוש וסינון תכנים">

          <!-- Search -->
          <div class="search-wrap">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input
              type="search"
              id="searchInput"
              placeholder="חפשו תוכן פדגוגי בנושא..."
              aria-label="חיפוש תוכן פדגוגי"
              autocomplete="off"
            />
            <button id="searchClear" aria-label="נקה חיפוש" title="נקה">✕</button>
          </div>

          <!-- Topic pills -->
          <div class="topic-pills-wrap" id="topicFilters" role="group" aria-label="סינון לפי נושא">
            <button class="tpill active" data-topic="all" aria-pressed="true">✨ הכל</button>
          </div>

          <!-- Group sub-filter (shown dynamically) -->
          <div class="group-pills-wrap" id="groupFilters" role="group" aria-label="סינון לפי תת-נושא" hidden></div>

          <!-- Clear filters -->
          <div class="filter-row">
            <button class="btn-clear" onclick="clearFilters()" aria-label="נקה את כל הסינונים">✕ נקה סינון</button>
          </div>

        </div>

        <!-- Results count -->
        <div id="resultsCount" aria-live="polite" aria-atomic="true"></div>

        <!-- Cards grid -->
        <div id="cardsGrid" role="list" aria-label="תוכן פדגוגי לגננות"></div>

      </div>
    </section>

  </main>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer class="site-footer">
    <div class="container ftr-copy">
      <p>© 2026 אנה גלפר | כל הזכויות שמורות 🦋</p>
      <p class="ftr-credit">עוצב ופותח על ידי <span>אביטל גלפר</span></p>
    </div>
  </footer>

  <!-- ═══════════════ EMBED MODAL ═══════════════ -->
  <div id="embedModal" class="embed-modal" role="dialog" aria-modal="true" aria-labelledby="embedModalTitle" hidden>
    <div class="embed-modal-backdrop" id="embedModalBackdrop"></div>
    <div class="embed-modal-box">
      <div class="embed-modal-header">
        <h2 class="embed-modal-title" id="embedModalTitle"></h2>
<button class="embed-modal-close" id="embedModalClose" aria-label="סגור">✕</button>
      </div>
      <div class="embed-modal-body">
        <div class="embed-modal-frame">
          <iframe id="embedModalIframe" src="" allowfullscreen></iframe>
        </div>
        <aside class="embed-modal-comments" id="embedModalComments" aria-label="תגובות">
          <div class="emc-header">💬 תגובות</div>
          <div class="emc-list" id="emcList"></div>
          <form class="emc-form" id="emcForm" novalidate>
            <input class="emc-name" id="emcName" type="text" placeholder="השם שלך (אופציונלי)" maxlength="50" autocomplete="off" />
            <textarea class="emc-text" id="emcText" placeholder="כתבו תגובה על המערך..." rows="3" maxlength="500" required></textarea>
            <button class="emc-submit" type="submit">💬 שלחו תגובה</button>
          </form>
        </aside>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
